<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تنبيه: تعليق الخدمة</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body {
            font-family: 'Tajawal', sans-serif;
            background: linear-gradient(135deg, #f3f4f6 0%, #e5e7eb 100%);
        }
        .status-card {
            background: rgba(255, 255, 255, 0.98);
            border-top: 6px solid #dc2626; /* لون أحمر للتنبيه */
        }
        .animate-pulse-slow {
            animation: pulse 2s cubic-bezier(0.4, 0, 0.6, 1) infinite;
        }
        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: .7; }
        }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center p-4">

    <div class="max-w-md w-full status-card rounded-2xl shadow-2xl overflow-hidden">
        
        <div class="p-6 text-center bg-red-50">
            <div class="inline-flex items-center justify-center w-16 h-16 bg-red-100 text-red-600 rounded-full mb-4 animate-pulse-slow">
                <i class="fas fa-exclamation-triangle text-2xl"></i>
            </div>
            <h1 class="text-xl font-bold text-red-700 mb-2">تم إغلاق الموقع مؤقتاً</h1>
            <p class="text-gray-600 text-sm">يرجى سداد المبلغ المتبقي لتفعيل الخدمة مرة أخرى</p>
        </div>

        <div class="px-6 py-4 text-center border-b border-gray-100">
            <span class="text-gray-400 text-xs block mb-1">المبلغ المطلوب</span>
            <div class="text-3xl font-black text-gray-800">
                50 <span class="text-base font-bold">شيكل</span>
            </div>
        </div>

        <div class="p-6 space-y-3">
            <div class="flex items-center p-3 bg-gray-50 rounded-lg border border-gray-100">
                <i class="fas fa-id-badge text-gray-400 ml-3 text-lg"></i>
                <div>
                    <p class="text-[10px] text-gray-500 uppercase leading-none mb-1">اسم الحساب</p>
                    <p class="font-bold text-gray-700">أنور الندا</p>
                </div>
            </div>

            <div class="flex items-center p-3 bg-gray-50 rounded-lg border border-gray-100">
                <i class="fas fa-phone-alt text-gray-400 ml-3 text-lg"></i>
                <div>
                    <p class="text-[10px] text-gray-500 uppercase leading-none mb-1">رقم الدفع / التحويل</p>
                    <p class="font-bold text-gray-700 tracking-wider">0597603119</p>
                </div>
            </div>

            <div class="pt-2 space-y-2">
                <p class="text-xs font-bold text-gray-400 mr-1 uppercase">قنوات الدفع المتاحة:</p>
                
                <div class="grid grid-cols-1 gap-2">
                    <div class="flex items-center p-3 border border-blue-100 rounded-lg bg-blue-50/50">
                        <i class="fas fa-university text-blue-600 ml-3"></i>
                        <span class="text-sm font-medium text-gray-700">بنك فلسطين</span>
                    </div>
                    
                    <div class="flex items-center p-3 border border-orange-100 rounded-lg bg-orange-50/50">
                        <i class="fas fa-wallet text-orange-600 ml-3"></i>
                        <span class="text-sm font-medium text-gray-700">محفظة PAL PAY</span>
                    </div>

                    <div class="flex items-center p-3 border border-red-100 rounded-lg bg-red-50/50">
                        <i class="fas fa-mobile-screen text-red-600 ml-3"></i>
                        <span class="text-sm font-medium text-gray-700">محفظة جوال باي (Jawwal Pay)</span>
                    </div>
                </div>
            </div>
        </div>

        <div class="px-6 pb-6">
            <a href="https://wa.me/970515948259" class="w-full bg-[#25D366] hover:bg-[#128C7E] text-white py-3 rounded-xl transition-all duration-300 flex items-center justify-center font-bold shadow-md">
                <i class="fab fa-whatsapp ml-2 text-xl"></i>
                تواصل عبر واتساب
            </a>
            <p class="text-center text-[10px] text-gray-400 mt-4">سيتم إعادة تشغيل الموقع تلقائياً فور تأكيد التحويل</p>
        </div>

    </div>

</body>
</html>
